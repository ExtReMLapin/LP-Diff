<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LP-Diff Viewer</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

  <header>
    <h1>LP-Diff Viewer</h1>
    <nav class="tabs">
      <button class="tab active" data-tab="results">Résultats</button>
      <button class="tab" data-tab="infer">Inférence</button>
    </nav>
    <div class="controls" id="results-controls">
      <label for="exp-select">Experiment</label>
      <select id="exp-select">
        <option value="">-- Sélectionner --</option>
      </select>
    </div>
  </header>

  <!-- ── Résultats view ── -->
  <div id="view-results">
    <div id="epoch-bar" class="epoch-bar hidden">
      <span id="epoch-label">Epoch —</span>
      <input type="range" id="epoch-slider" min="0" max="0" value="0" />
      <span id="iter-label"></span>
    </div>

    <div id="metrics-section" class="metrics-section hidden">
      <div class="metrics-header" id="metrics-toggle">
        <span>Metrics</span>
        <span class="metrics-chevron" id="metrics-chevron">▼</span>
      </div>
      <div class="metrics-body" id="metrics-body">
        <div class="charts-row">
          <div class="chart-wrap">
            <div class="chart-title">Train Loss</div>
            <canvas id="chart-train"></canvas>
          </div>
          <div class="chart-wrap">
            <div class="chart-title">Validation PSNR &amp; Loss</div>
            <canvas id="chart-val"></canvas>
          </div>
          <div class="chart-wrap">
            <div class="chart-title">Detailed Train Losses</div>
            <canvas id="chart-detail"></canvas>
          </div>
        </div>
      </div>
    </div>

    <div id="loading" class="loading hidden">Chargement…</div>
    <div id="grid" class="grid"></div>
  </div>

  <!-- ── Inférence view ── -->
  <div id="view-infer" class="hidden">
    <div class="infer-panel">

      <div class="infer-row">
        <label for="infer-exp-select">Expérience</label>
        <select id="infer-exp-select">
          <option value="">-- Sélectionner --</option>
        </select>
        <span id="infer-ckpt-label" class="infer-ckpt-label"></span>
      </div>

      <!-- Drop zone -->
      <div id="drop-zone" class="drop-zone">
        <input type="file" id="file-input" accept="image/*" multiple hidden />
        <div class="drop-zone-inner">
          <div class="drop-icon">🖼</div>
          <div class="drop-text">Déposer 1–3 images LR ici</div>
          <div class="drop-sub">ou <button class="link-btn" id="browse-btn">parcourir</button></div>
        </div>
      </div>

      <div id="file-error" class="file-error hidden"></div>

      <!-- Thumbnails -->
      <div id="thumb-row" class="thumb-row hidden">
        <div id="thumbs" class="thumbs"></div>
        <span id="frame-count" class="frame-count"></span>
      </div>

      <button id="run-btn" class="run-btn" disabled>Lancer l'inférence</button>

      <!-- Status -->
      <div id="infer-status" class="infer-status hidden"></div>

      <!-- Results -->
      <div id="infer-results" class="infer-results hidden">
        <div class="infer-results-title">Résultat</div>
        <div class="infer-results-row" id="infer-results-row"></div>
      </div>

    </div>
  </div>

  <!-- Modal (shared) -->
  <div id="modal" class="modal hidden">
    <div class="modal-backdrop" id="modal-backdrop"></div>
    <div class="modal-content">
      <button class="modal-close" id="modal-close">✕</button>
      <div class="modal-title" id="modal-title"></div>
      <div class="modal-images" id="modal-images"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
